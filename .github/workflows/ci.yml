name: CI

on:
  pull_request:
  push:
    branches: [ master ]

jobs:

  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: bin/brakeman --no-pager
      - run: bin/bundler-audit

  scan_js:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: bin/importmap audit

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: bin/rubocop -f github
